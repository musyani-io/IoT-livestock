<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Settings - Livestock Health Monitor</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/farmer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="farmer-app">
        <header class="farmer-header">
            <div class="header-content">
                <div class="header-left">
                    <span class="header-logo"><i class="fas fa-heartbeat"></i></span>
                    <span class="header-title">Livestock Monitor</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-icon logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="farmer-main">
            <section class="welcome-section">
                <h2>Settings</h2>
                <p>Manage your account and alerts</p>
            </section>

            <section class="card">
                <div class="section-header">
                    <h3 class="section-title">Account</h3>
                </div>
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input id="displayName" type="text" class="input" placeholder="Farmer">
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input id="phoneNumber" type="tel" class="input" placeholder="+000 000 000">
                </div>
                <button class="btn btn-primary">Save</button>
            </section>

            <section class="card">
                <div class="section-header">
                    <h3 class="section-title">Alerts</h3>
                </div>
                <div class="toggle-row">
                    <span>SMS Alerts</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-row">
                    <span>Email Alerts</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-items">
                <a href="farmer-dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="farmer-livestock.html" class="nav-item">
                    <i class="fas fa-cow"></i>
                    <span>Livestock</span>
                </a>
                <a href="farmer-alerts.html" class="nav-item">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Alerts</span>
                </a>
                <a href="farmer-settings.html" class="nav-item active">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
