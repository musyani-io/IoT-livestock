<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Analysis - Livestock Health Surveillance</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/ministry.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="ministry-app">
        <!-- Sidebar -->
        <aside class="ministry-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>LH Surveillance</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="ministry-dashboard.html" class="sidebar-link">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="ministry-regions.html" class="sidebar-link">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Regional Data</span>
                    </a>
                    <a href="ministry-alerts.html" class="sidebar-link">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span>Disease Alerts</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">Analysis</div>
                    <a href="ministry-trends.html" class="sidebar-link active">
                        <i class="fas fa-chart-line"></i>
                        <span>Trend Analysis</span>
                    </a>
                    <a href="ministry-heatmap.html" class="sidebar-link">
                        <i class="fas fa-fire"></i>
                        <span>Risk Heat Map</span>
                    </a>
                    <a href="ministry-reports.html" class="sidebar-link">
                        <i class="fas fa-file-alt"></i>
                        <span>Reports</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">Settings</div>
                    <a href="ministry-settings.html" class="sidebar-link">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name">Ministry Official</div>
                        <div class="user-role">Administrator</div>
                    </div>
                    <button class="btn btn-icon" onclick="logout()" style="background: transparent; color: rgba(255,255,255,0.7);">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="ministry-main">
            <!-- Top Header -->
            <header class="ministry-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search trends...">
                </div>
                <div class="header-actions">
                    <span class="header-date" id="currentDate">January 16, 2026</span>
                    <button class="btn btn-icon">
                        <i class="fas fa-bell"></i>
                    </button>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="dashboard-content">
                <h1 class="page-title">Disease Trend Analysis</h1>
                <p class="page-subtitle">Weekly aggregated trends across monitored regions</p>

                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3 class="chart-title">Disease Occurrence Trends</h3>
                            <div class="chart-actions">
                                <select class="btn btn-outline" style="padding: 4px 12px; min-height: 36px;">
                                    <option>Last 30 Days</option>
                                    <option>Last 90 Days</option>
                                    <option>Last 12 Months</option>
                                </select>
                            </div>
                        </div>
                        <div class="chart-body">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                    
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3 class="chart-title">Alert Distribution</h3>
                        </div>
                        <div class="chart-body">
                            <canvas id="alertDistChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Mobile Sidebar Toggle -->
        <button class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/ministry-data.js"></script>
    <script src="js/ministry-dashboard.js"></script>
</body>
</html>
