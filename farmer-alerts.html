<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Alerts - Livestock Health Monitor</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/farmer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="farmer-app">
        <!-- Header -->
        <header class="farmer-header">
            <div class="header-content">
                <div class="header-left">
                    <span class="header-logo"><i class="fas fa-exclamation-triangle"></i></span>
                    <span class="header-title">All Alerts</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-icon logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="farmer-main">
            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="alert">Critical</button>
                <button class="filter-tab" data-filter="warning">Warning</button>
                <button class="filter-tab" data-filter="resolved">Resolved</button>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search alerts..." id="alertSearch">
            </div>

            <!-- Alerts List -->
            <section class="alert-list" id="allAlertsList">
                <!-- Alerts are rendered by JavaScript -->
            </section>

            <!-- Load More Button -->
            <button class="btn btn-outline" style="width: 100%; margin-top: var(--spacing-md);">
                <i class="fas fa-chevron-down"></i>
                Load More
            </button>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-items">
                <a href="farmer-dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="farmer-livestock.html" class="nav-item">
                    <i class="fas fa-cow"></i>
                    <span>Livestock</span>
                </a>
                <a href="farmer-alerts.html" class="nav-item active">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Alerts</span>
                </a>
                <a href="farmer-settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/farmer-data.js"></script>
    <script src="js/farmer-alerts.js"></script>
</body>
</html>
