<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Livestock - Livestock Health Monitor</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/farmer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="farmer-app">
        <!-- Header -->
        <header class="farmer-header">
            <div class="header-content">
                <div class="header-left">
                    <span class="header-logo"><i class="fas fa-cow"></i></span>
                    <span class="header-title">My Livestock</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-icon logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="farmer-main">
            <!-- Stats Summary -->
            <section class="stats-grid">
                <div class="stat-card normal">
                    <div class="stat-number" id="totalAnimals">12</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-number" id="warningCount">2</div>
                    <div class="stat-label">Warning</div>
                </div>
                <div class="stat-card alert">
                    <div class="stat-number" id="alertCount">1</div>
                    <div class="stat-label">Alert</div>
                </div>
            </section>

            <!-- Search Bar -->
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search by Animal ID..." id="livestockSearch">
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All (12)</button>
                <button class="filter-tab" data-filter="cattle">Cattle (6)</button>
                <button class="filter-tab" data-filter="goat">Goats (4)</button>
                <button class="filter-tab" data-filter="sheep">Sheep (2)</button>
            </div>

            <!-- Livestock List -->
            <section class="livestock-list" id="fullLivestockList">
                <!-- Items rendered by JavaScript -->
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-items">
                <a href="farmer-dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="farmer-livestock.html" class="nav-item active">
                    <i class="fas fa-cow"></i>
                    <span>Livestock</span>
                </a>
                <a href="farmer-alerts.html" class="nav-item">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Alerts</span>
                </a>
                <a href="farmer-settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/farmer-data.js"></script>
    <script src="js/farmer-livestock.js"></script>
</body>
</html>
