<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard - Livestock Health Monitor</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/farmer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="farmer-app">
        <!-- Header -->
        <header class="farmer-header">
            <div class="header-content">
                <div class="header-left">
                    <span class="header-logo"><i class="fas fa-heartbeat"></i></span>
                    <span class="header-title">Livestock Monitor</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-icon notification-btn" onclick="showNotifications()">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge" id="notificationCount">3</span>
                    </button>
                    <button class="btn btn-icon logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="farmer-main">
            <!-- Welcome Section -->
            <section class="welcome-section">
                <h2>Hello, <span id="farmerName">Farmer</span>!</h2>
                <p>Here's your livestock health overview</p>
            </section>

            <!-- Stats Overview -->
            <section class="stats-grid">
                <div class="stat-card normal">
                    <div class="stat-number" id="totalAnimals">12</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-number" id="warningCount">2</div>
                    <div class="stat-label">Warning</div>
                </div>
                <div class="stat-card alert">
                    <div class="stat-number" id="alertCount">1</div>
                    <div class="stat-label">Alert</div>
                </div>
            </section>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All Animals</button>
                <button class="filter-tab" data-filter="normal">Normal</button>
                <button class="filter-tab" data-filter="warning">Warning</button>
                <button class="filter-tab" data-filter="alert">Alert</button>
            </div>

            <!-- Livestock List -->
            <section class="livestock-list" id="livestockList">
                <!-- Livestock items will be rendered by JavaScript -->
            </section>

            <!-- Recent Alerts -->
            <section class="alert-section">
                <div class="section-header">
                    <h3 class="section-title">Recent Alerts</h3>
                    <a href="farmer-alerts.html" class="section-link">
                        View All <i class="fas fa-chevron-right"></i>
                    </a>
                </div>
                <div class="alert-list" id="alertList">
                    <!-- Alerts will be rendered by JavaScript -->
                </div>
            </section>

            <!-- Recommendations -->
            <section class="recommendations-section">
                <div class="section-header">
                    <h3 class="section-title">Recommendations</h3>
                </div>
                <div id="recommendationsList">
                    <!-- Recommendations will be rendered by JavaScript -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-items">
                <a href="farmer-dashboard.html" class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="farmer-livestock.html" class="nav-item">
                    <i class="fas fa-cow"></i>
                    <span>Livestock</span>
                </a>
                <a href="farmer-alerts.html" class="nav-item">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Alerts</span>
                </a>
                <a href="farmer-settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
        </nav>
    </div>

    <!-- Offline Indicator -->
    <div class="offline-indicator" id="offlineIndicator">
        <i class="fas fa-wifi-slash"></i> You are currently offline
    </div>

    <script src="js/auth.js"></script>
    <script src="js/farmer-data.js"></script>
    <script src="js/farmer-dashboard.js"></script>
</body>
</html>
